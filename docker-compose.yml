version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      - MONGO_URI=mongodb://mongo:27017/smart-leads
      - JWT_SECRET=changeme
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "5173:5173"
    depends_on:
      - server

volumes:
  mongo-data:
